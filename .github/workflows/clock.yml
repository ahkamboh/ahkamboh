name: rhyming clock
on:
  schedule:
    - cron: '*/10 * * * *'   # every ~30 min (GitHub cron is best-effort)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: clock
  cancel-in-progress: true
jobs:
  clock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: generate clock.svg
        env:
          # uses a CLOCK_TOKEN secret if you add one, otherwise the built-in token
          CLOCK_TOKEN: ${{ secrets.CLOCK_TOKEN || github.token }}
          CLOCK_LOGIN: ahkamboh
          CLOCK_TZ: Asia/Karachi
        run: node clock/gen.js
      - name: publish to the clock branch (force-push, single commit — no history bloat, not on the default branch so it never counts as a contribution)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "clock-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/pub && cp clock.svg /tmp/pub/
          cd /tmp/pub
          git init -q -b clock
          git add clock.svg
          git commit -q -m "clock $(date -u +%FT%TZ)"
          git push -q --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" clock
