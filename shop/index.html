<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamboh Store — Modern E-commerce</title>
  <meta name="description" content="A clean, fast demo e-commerce storefront built with plain HTML, CSS and JavaScript." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="brand" aria-label="Kamboh Store home">
        <span class="brand-mark">🛍️</span>
        <span class="brand-name">Kamboh<strong>Store</strong></span>
      </a>

      <div class="search">
        <input type="search" id="searchInput" placeholder="Search products…" aria-label="Search products" />
      </div>

      <nav class="header-actions">
        <select id="categoryFilter" class="category-select" aria-label="Filter by category">
          <option value="all">All categories</option>
        </select>
        <button id="cartBtn" class="cart-btn" aria-label="Open cart">
          🛒 <span class="cart-count" id="cartCount">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="container hero-inner">
      <div class="hero-text">
        <h1>Gear that works as hard as you do.</h1>
        <p>Curated tech, audio and lifestyle products. Free shipping over $100.</p>
        <a href="#products" class="btn btn-primary">Shop now</a>
      </div>
    </div>
  </section>

  <!-- Products -->
  <main class="container">
    <section id="products" aria-labelledby="productsHeading">
      <div class="section-head">
        <h2 id="productsHeading">Products</h2>
        <span id="resultCount" class="result-count"></span>
      </div>
      <div class="product-grid" id="productGrid"></div>
      <p class="empty-state" id="emptyState" hidden>No products match your search.</p>
    </section>
  </main>

  <!-- Cart drawer -->
  <div class="cart-overlay" id="cartOverlay" hidden></div>
  <aside class="cart-drawer" id="cartDrawer" aria-label="Shopping cart" aria-hidden="true">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="icon-btn" id="closeCart" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Subtotal</span>
        <strong id="cartTotal">$0.00</strong>
      </div>
      <button class="btn btn-primary btn-block" id="checkoutBtn" disabled>Checkout</button>
    </div>
  </aside>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> Kamboh Store — demo storefront. Built with plain HTML, CSS &amp; JS.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
